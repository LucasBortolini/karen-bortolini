services:
  install:
    build: .
    command: sh docker/npm-install.sh
    volumes:
      - .:/app
      - node_modules:/app/node_modules

  dev:
    build: .
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      install:
        condition: service_completed_successfully
  build:
    build: .
    command: npm run build
    volumes:
      - .:/app
      - node_modules:/app/node_modules
  preview:
    build: .
    command: npm run preview -- --host 0.0.0.0
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    profiles:
      - preview

volumes:
  node_modules:
