title: Tutoria e Acompanhamento Acadêmico
description: Suporte ao desenvolvimento acadêmico.
body: >-
  Cada estudante possui um ritmo, uma trajetória e desafios específicos no processo de aprendizagem. Por isso, o acompanhamento acadêmico precisa ir além de respostas prontas e atuar como suporte estratégico no desenvolvimento educacional.

  Atuo com tutoria e acompanhamento acadêmico em disciplinas de Comunicação, Metodologia Científica, Audiovisual, Tecnologia, Pedagogia, Ensino e Educação a Distância (EaD), auxiliando estudantes no desenvolvimento de competências acadêmicas, organização dos estudos e construção do pensamento crítico.
category: ensino
order: 14
