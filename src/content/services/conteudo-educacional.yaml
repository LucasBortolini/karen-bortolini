title: Produção de Conteúdo Educacional
description: Desenvolvimento de materiais didáticos para ensino superior.
body: >-
  Produzir conteúdo educacional vai muito além de organizar textos e referências. Um bom material didático precisa dialogar com o estudante, estimular a aprendizagem e transformar conteúdos complexos em experiências mais claras, acessíveis e significativas.

  Atuo no desenvolvimento de materiais didáticos para graduação, pós-graduação e educação corporativa, integrando linguagem acadêmica, comunicação estratégica e metodologias contemporâneas de ensino. Produzo conteúdos para disciplinas presenciais e EaD, incluindo apostilas, roteiros, atividades, fóruns, bancos de questões, trilhas de aprendizagem e materiais complementares.
category: ensino
order: 10
