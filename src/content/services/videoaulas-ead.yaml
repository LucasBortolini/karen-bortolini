title: Produção de Videoaulas e Conteúdo para EaD
description: Criação de aulas e conteúdos educacionais digitais.
body: >-
  A videoaula deixou de ser apenas um recurso complementar e passou a ocupar papel central na educação digital contemporânea. Mas produzir conteúdos educacionais em vídeo exige mais do que domínio técnico: envolve linguagem, didática, roteiro e conexão com o estudante.

  Atuo na criação de videoaulas, conteúdos multimídia e materiais para educação a distância, integrando estratégias de comunicação, audiovisual e metodologias de ensino. Desenvolvo roteiros, apresentações, materiais de apoio e conteúdos voltados para graduação, pós-graduação, treinamentos e projetos educacionais digitais.
category: ensino
order: 15
