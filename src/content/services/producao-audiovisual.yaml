title: Produção Audiovisual e Storytelling
description: Desenvolvimento de roteiros, direção e produção audiovisual.
body: >-
  A linguagem audiovisual nunca esteve tão presente na comunicação contemporânea. O que começou ainda no cinema mudo hoje ocupa múltiplas plataformas digitais, redes sociais e formatos de consumo cada vez mais dinâmicos.

  Empresas, instituições e profissionais perceberam que não basta apenas ser visto. É preciso gerar conexão por meio de narrativas que envolvam o público. É nesse contexto que o storytelling ganha força.

  Atuo na criação de roteiros, direção e desenvolvimento de conteúdos audiovisuais institucionais, educacionais e jornalísticos, transformando informação em narrativas mais humanas, estratégicas e envolventes.
category: comunicacao
order: 5
