title: Design Instrucional para Educação Digital
description: Estruturação de cursos com metodologias ativas.
body: >-
  A educação digital exige mais do que simplesmente transferir conteúdos para plataformas online. É preciso construir experiências de aprendizagem que façam sentido para diferentes perfis de estudantes e contextos educacionais.

  Com experiência em graduação, pós-graduação e projetos EaD, desenvolvo cursos e conteúdos estruturados com metodologias ativas, organização pedagógica e recursos multimídia. O objetivo é tornar o aprendizado mais dinâmico, participativo e alinhado às demandas contemporâneas da educação digital.
category: ensino
order: 11
