title: Media Training e Comunicação Profissional
description: Preparação para entrevistas e apresentações.
body: >-
  Falar em público, conceder entrevistas ou representar uma marca diante das câmeras exige preparo, segurança e estratégia comunicacional.

  O media training auxilia profissionais, gestores e porta-vozes a desenvolverem uma comunicação mais clara, segura e eficiente em entrevistas, apresentações e situações públicas. Além da construção discursiva, também são trabalhados postura, linguagem verbal, expressão vocal e posicionamento diante do público e da mídia.
category: comunicacao
order: 7
