heroParagraphs:
  - >-
    Karen Bortolini é pós-doutora, doutora e mestre em Comunicação e Linguagens,
    especialista em comunicação empresarial e jornalista. Conta com mais de 20 anos
    de experiência em comunicação estratégica, produção de conteúdo multimídia e educação digital.
  - >-
    No ensino superior, possui experiência em graduação e pós-graduação, com atuação em
    disciplinas de Jornalismo, Publicidade, Relações Públicas, Marketing, Audiovisual,
    Metodologia de Pesquisa, Tecnologia, Pedagogia, Ensino e Educação a Distância (EaD).
  - >-
    Desenvolve conteúdos didáticos, orienta trabalhos acadêmicos, presta tutoria de ensino
    e aplica metodologias ativas com uso de inteligência artificial. Seu trabalho conecta
    comunicação, educação e tecnologia para gerar posicionamento, engajamento e resultados.
