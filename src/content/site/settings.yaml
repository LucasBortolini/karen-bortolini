heroSummary: >-
  Karen Bortolini é jornalista, doutora e pós-doutora em Comunicação e Linguagens,
  especialista em comunicação empresarial, com quase 20 anos de experiência em comunicação
  estratégica, produção de conteúdo multimídia e educação digital. Atua no desenvolvimento
  de projetos de comunicação integrada, assessoria de imprensa, produção audiovisual e
  criação de conteúdo para múltiplas mídias. No ensino superior, possui experiência em
  graduação e pós-graduação, com atuação em disciplinas de Jornalismo, Publicidade,
  Relações Públicas, Marketing, Audiovisual, Metodologia de Pesquisa, Tecnologia, Pedagogia,
  Ensino e Educação a Distância (EaD). Desenvolve conteúdos didáticos, orienta trabalhos
  acadêmicos, presta tutoria de ensino e aplica metodologias ativas com uso de inteligência artificial.
  Seu trabalho conecta comunicação, educação e tecnologia para gerar posicionamento, engajamento e resultados.
aboutBio:
  - >-
    Karen Bortolini é jornalista, doutora e pós-doutora em Comunicação e Linguagens pela
    Universidade Tuiuti do Paraná (UTP), com trajetória consolidada no mercado de comunicação
    e no ensino superior.
  - >-
    Com quase 20 anos de experiência, atua em comunicação estratégica, assessoria de imprensa,
    produção de conteúdo multimídia e audiovisual, além da docência em graduação e pós-graduação.
  - >-
    Integra comunicação, educação e tecnologia na criação de conteúdos educacionais, orientação
    acadêmica e desenvolvimento de soluções digitais com metodologias ativas e inteligência artificial.
